<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0F1A"/>
      <stop offset="100%" stop-color="#16182A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A259FF"/>
      <stop offset="100%" stop-color="#1ABCFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Brand icon, scaled (centered at ~(240, 300) — left of the text block) -->
  <g transform="translate(105, 165) scale(2.7)">
    <rect x="5"  y="5"  width="58" height="26" rx="5" fill="#F24E1E"/>
    <rect x="69" y="5"  width="26" height="58" rx="5" fill="#A259FF"/>
    <rect x="5"  y="37" width="26" height="58" rx="5" fill="#0ACF83"/>
    <rect x="37" y="69" width="58" height="26" rx="5" fill="#1ABCFE"/>
    <rect x="37" y="37" width="26" height="26" rx="5" fill="#FFFFFF"/>
  </g>

  <!-- Title -->
  <text x="500" y="240"
        font-family="Inter, system-ui, sans-serif"
        font-weight="800" font-size="76" fill="#FFFFFF"
        letter-spacing="-2">AutoLayout PRO</text>

  <!-- Tagline -->
  <text x="500" y="300"
        font-family="Inter, system-ui, sans-serif"
        font-weight="400" font-size="30" fill="#B8B8C8">Figma-like layout engine for Unity uGUI</text>

  <!-- Feature pills -->
  <g transform="translate(500, 360)" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="20">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="rgba(162, 89, 255, 0.18)" stroke="#A259FF" stroke-width="1.5"/>
    <text x="90" y="29" text-anchor="middle" fill="#C39BFF">Burst-compiled</text>

    <rect x="200" y="0" width="120" height="44" rx="22" fill="rgba(26, 188, 254, 0.18)" stroke="#1ABCFE" stroke-width="1.5"/>
    <text x="260" y="29" text-anchor="middle" fill="#7AD8FF">Zero-GC</text>

    <rect x="340" y="0" width="220" height="44" rx="22" fill="rgba(10, 207, 131, 0.18)" stroke="#0ACF83" stroke-width="1.5"/>
    <text x="450" y="29" text-anchor="middle" fill="#7DEBB5">Incremental rebuilds</text>
  </g>

  <!-- Footer URL -->
  <text x="500" y="540"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="22" fill="#7C5CFF">autolayoutpro.com</text>
</svg>
