<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="100" height="100" rx="18" fill="#202020" />

  <g filter="url(#dropShadow)" transform="translate(50 50) scale(0.78) translate(-50 -50)">
    <rect x="5"  y="5"  width="58" height="26" rx="5" fill="#F24E1E" />
    <rect x="69" y="5"  width="26" height="58" rx="5" fill="#A259FF" />
    <rect x="5"  y="37" width="26" height="58" rx="5" fill="#0ACF83" />
    <rect x="37" y="69" width="58" height="26" rx="5" fill="#1ABCFE" />
    <rect x="37" y="37" width="26" height="26" rx="5" fill="#FFFFFF" />
  </g>
</svg>
